services:
  - type: web
    name: ledger-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PUBLIC_BACKEND_URL
        value: https://api.ledgerworkspace.com
      - key: PUBLIC_FRONTEND_URL
        value: https://www.ledgerworkspace.com
      - key: OPENAI_APPS_CHALLENGE_TOKEN
        sync: false
      - key: FIGMA_CLIENT_ID
        sync: false
      - key: FIGMA_CLIENT_SECRET
        sync: false
      - key: FIGMA_REDIRECT_URI
        value: https://api.ledgerworkspace.com/api/integrations/figma/oauth/callback
      - key: FIGMA_STATE_SECRET
        sync: false
      - key: INTEGRATION_TOKEN_ENCRYPTION_KEY
        sync: false
